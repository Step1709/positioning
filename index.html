<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Практика позиционирования</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button id="openModal">Открыть модальное окно</button>

    <div class="overlay" id="overlay">
        <div class="modal">
            <button class="close" id="closeModal">&times;</button>
            <h2>Заголовок модального окна</h2>
            <p>
                Это пример контента. Высота окна автоматически подстраивается под содержимое.
            </p>
        </div>
    </div>
    <div class = 'wraper'>
        <div class = 'logo logomiky'>
            <div class = 'gibball'></div>
            <div class = 'leftball'></div>
            <div class = 'rightball'></div>
        </div>

        <div class = 'logo logojapan'>
            <div class = 'redball'></div>
            <div class = 'redball'></div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
